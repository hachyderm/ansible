---
name: Ansible CI
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: ansible-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  ANSIBLE_FORCE_COLOR: true
  ANSIBLE_GALAXY_SERVER_GALAXY_URL: "https://galaxy.ansible.com"
  ANSIBLE_GALAXY_SERVER_GALAXY_TIMEOUT: 120
  ANSIBLE_GALAXY_SERVER_LIST: "galaxy"

permissions: {}

jobs:
  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Ansible lint
        uses: ansible/ansible-lint@a2bc8b8b13a80802215856c56823d85007d3baf5  # v25.12.2
        with:
          requirements_file: test-requirements.yml

  ansible-sanity:
    needs:
      - ansible-lint
    uses: ./.github/workflows/ansible-sanity.yml

  molecule:
    needs:
      - ansible-lint
    uses: ./.github/workflows/molecule.yml
