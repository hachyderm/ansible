---
- name: Install package
  become: true
  ansible.builtin.apt:
    deb: "{{ anubis_deb }}"

- name: Deploy env file
  become: true
  ansible.builtin.template:
    src: default.env.j2
    dest: "/etc/anubis/default.env"
    owner: root
    group: root
    mode: "0600"
  notify: Restart Anubis

- name: Define default policies
  ansible.builtin.set_fact:
    anubis_default_bot_policies:
      bots:
        - import: (data)/bots/_deny-pathological.yaml
        - import: (data)/bots/aggressive-brazilian-scrapers.yaml
        - import: (data)/meta/ai-block-aggressive.yaml
        - import: (data)/crawlers/_allow-good.yaml
        - import: (data)/clients/x-firefox-ai.yaml
        - import: (data)/common/keep-internet-working.yaml
        - name: generic-browser
          user_agent_regex: >-
            Mozilla|Opera
          action: WEIGH
          weight:
            adjust: 10
      dnsbl: false
      openGraph:
        enabled: false
        considerHost: false
        ttl: 24h
      status_codes:
        CHALLENGE: 200
        DENY: 200
      store:
        backend: memory
        parameters: {}
      thresholds:
        - name: minimal-suspicion
          expression: weight <= 0
          action: ALLOW
        - name: mild-suspicion
          expression:
            all:
              - weight > 0
              - weight < 10
          action: CHALLENGE
          challenge:
            algorithm: metarefresh
            difficulty: 1
        - name: moderate-suspicion
          expression:
            all:
              - weight >= 10
              - weight < 20
          action: CHALLENGE
          challenge:
            algorithm: fast
            difficulty: 2
        - name: mild-proof-of-work
          expression:
            all:
              - weight >= 20
              - weight < 30
          action: CHALLENGE
          challenge:
            algorithm: fast
            difficulty: 4
        - name: extreme-suspicion
          expression: weight >= 30
          action: CHALLENGE
          challenge:
            algorithm: fast
            difficulty: 6

- name: Configure BBolt store backend
  ansible.builtin.set_fact:
    anubis_bot_policies: "{{ anubis_default_bot_policies | combine({'store': {'backend': 'bbolt', 'parameters': {'path': anubis_bbolt_path}}}) }}"
  when: anubis_bbolt_path is defined

- name: Configure Valkey store backend
  ansible.builtin.set_fact:
    anubis_bot_policies: "{{ anubis_default_bot_policies | combine({'store': {'backend': 'valkey', 'parameters': {'url': anubis_valkey_url}}}) }}"
  when: anubis_valkey_url is defined

- name: Configure bot policies
  ansible.builtin.set_fact:
    anubis_bot_policies: "{{ anubis_default_bot_policies | combine(anubis_bot_policies) }}"

- name: Deploy bot policies
  become: true
  ansible.builtin.copy:
    content: "{{ anubis_bot_policies | to_nice_yaml }}"
    dest: "/etc/anubis/default.botPolicies.yaml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Anubis

- name: Start and enable service
  become: true
  ansible.builtin.service:
    name: "anubis@default.service"
    state: started
    enabled: true
